; kv4p RX streamer — standalone RX-only firmware serving live PCM audio over HTTP.
; Build:  pio run          Flash:  pio run -t upload          Monitor: pio device monitor
[platformio]
src_dir = .
default_envs = esp32dev

[env:esp32dev]
platform = espressif32 @ 6.10.0
board = esp32dev
framework = arduino
monitor_speed = 115200
board_build.partitions = min_spiffs.csv  ; two ~1.9MB OTA slots, required for the web updater
build_flags =
  -DARDUINO_RUNNING_CORE=1
  -DARDUINO_EVENT_RUNNING_CORE=0
  -DDECODER_SELFTEST=1
lib_deps =
    https://github.com/fatpat/arduino-dra818.git#89582e3ef7bf3f31f1af149e32cec16c4b9e4cf2
    arduino-audio-tools=https://github.com/pschatzmann/arduino-audio-tools/archive/refs/tags/v1.2.3.zip
    bblanchon/ArduinoJson@^6.21.5
    links2004/WebSockets@^2.4.2

[env:esp32dev-release]
build_type = release
extends = env:esp32dev
build_unflags =
  -Os
build_flags =
  -DARDUINO_RUNNING_CORE=1
  -DARDUINO_EVENT_RUNNING_CORE=0
  -DRELEASE=1
  -O3
