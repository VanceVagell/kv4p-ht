; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
src_dir = kv4p_ht_esp32_wroom_32
default_envs = esp32dev, esp32dev-release, native-tests

[env:esp32dev]
build_type = debug
platform = espressif32 @ 6.10.0
board = esp32dev
framework = arduino
monitor_speed = 115200
test_build_src = no
test_ignore = *
build_flags =
  -DARDUINO_RUNNING_CORE=1
  -DARDUINO_EVENT_RUNNING_CORE=0
lib_deps =
    ; fatpat/DRA818@^1.0.1 
    https://github.com/fatpat/arduino-dra818.git#89582e3ef7bf3f31f1af149e32cec16c4b9e4cf2
    arduino-audio-tools=https://github.com/pschatzmann/arduino-audio-tools/archive/refs/tags/v1.0.1.zip
    arduino-libopus=https://github.com/pschatzmann/arduino-libopus/archive/refs/tags/a1.1.0.zip
    https://github.com/dkaukov/esp32-afsk.git#v0.1.0

[env:esp32dev-release]
build_type = release
extends = env:esp32dev
build_flags =
  -DARDUINO_RUNNING_CORE=1
  -DARDUINO_EVENT_RUNNING_CORE=0
  -DRELEASE=1

[env:native-tests]
build_type = test
platform = native
test_framework = unity
test_build_src = no
test_filter = test_kiss_protocol
build_flags =
  -DPIO_NATIVE_TEST=1
  -std=gnu++17
  -Ikv4p_ht_esp32_wroom_32
  -Itest/native_stubs
